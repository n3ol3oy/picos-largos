de:{...en,brand:"LANGE NOPPEN",navIdea:"Die Idee",navLab:"Labor",navPlay:"Spielplan",navQuiz:"Quiz",badge:"Schneller visueller Vereinsguide",heroTitle:'Lies den Spin.<br><span>Schlag die Noppen.</span>',lead:"Lange Noppen sind keine Magie. Sie geben deinen eigenen Spin verändert, reduziert oder umgekehrt zurück.",cta1:"Die 6 Schläge",cta2:"So spielst du sie",ideaK:"Die goldene Regel",ideaH:"Keine Magie. Nur eine Reaktion auf Spin.",ideaP:"Lange Noppen greifen den Ball nicht wie glatter Belag. Sie knicken ein, nehmen Energie auf und verändern den zurückkommenden Spin.",cards:[["Topspin kommt","Er kommt oft als Unterschnitt zurück. Deshalb landet dein nächster Angriff im Netz."],["Unterschnitt kommt","Der Rückball kann flacher oder flatternder sein."],["Wenig Spin kommt","Meist kommt wenig Spin zurück. Der Ball wirkt tot, langsam und tief."]],labK:"Visuelles Labor",labH:"Sechs wichtige Schläge",labP:"Wähle einen Schlag. Die Animation zeigt den Kontakt mit den Noppen.",playK:"Praktischer Plan",playH:"So überlebst du lange Noppen",playP:"Ärgere dich nicht über den Belag. Er zeigt nur, dass du deinen eigenen Spin nicht gelesen hast.",truth:[["1. Einfach anfangen.","Spiele flacher und mit weniger Spin."],["2. Nicht automatisch angreifen.","Nach viel Topspin kommt oft ein unterschnittener oder toter Ball."],["3. Flugbahn beobachten.","Flatterball: weniger heben. Schnittball: Schläger weiter öffnen."],["4. Rhythmus statt Ego.","Langsam, kurz, tief, flach." ]],quizK:"Mini-Quiz",quizH:"Verstanden?",correct:"Richtig.",wrong:"Das ist die klassische Falle.",result:"Ergebnis: {score}/3",footer:"Lies den Spin. Spiel den Ball. Gib nicht dem Belag die Schuld."},
fa:{...en,brand:"دانه‌بلند",navIdea:"اصل",navLab:"آزمایشگاه",navPlay:"نقشه بازی",navQuiz:"آزمون",badge:"راهنمای تصویری سریع باشگاه",heroTitle:'چرخش را بخوان.<br><span>دانه‌بلند را شکست بده.</span>',lead:"دانه‌بلند جادو نیست. چرخش خودت را تغییر‌یافته، کم‌شده یا معکوس برمی‌گرداند.",cta1:"۶ ضربه را ببین",cta2:"روش بازی",ideaK:"قانون طلایی",ideaH:"جادو نمی‌سازد؛ به چرخش واکنش نشان می‌دهد.",ideaP:"دانه‌بلند مثل رویه صاف توپ را نمی‌گیرد. خم می‌شود، انرژی را جذب می‌کند و چرخش برگشتی را تغییر می‌دهد.",cards:[["تاپ‌اسپین وارد می‌شود","اغلب به بک‌اسپین برمی‌گردد؛ برای همین حمله بعدی به تور می‌خورد."],["بک‌اسپین وارد می‌شود","برگشت ممکن است صاف‌تر یا شناورتر باشد."],["چرخش کم وارد می‌شود","معمولاً چرخش کمی برمی‌گردد. توپ مرده، کند و پایین است."]],labK:"آزمایشگاه تصویری",labH:"شش ضربه مهم",labP:"یک ضربه را بزن. پویانمایی برخورد توپ با دانه‌ها را نشان می‌دهد.",playK:"نقشه عملی",playH:"چطور برابر دانه‌بلند دوام بیاوریم",playP:"از رویه عصبانی نشو. فقط نشان می‌دهد چرخش خودت را نخوانده‌ای.",truth:[["۱. ساده شروع کن.","توپ صاف‌تر و با چرخش کمتر بزن."],["۲. خودکار حمله نکن.","بعد از تاپ‌اسپین زیاد، منتظر توپ کات یا مرده باش."],["۳. مسیر توپ را ببین.","توپ شناور را کمتر بلند کن؛ برای توپ کات راکت را بازتر کن."],["۴. ریتم را عوض کن، نه غرور را.","کند، کوتاه، عمیق و صاف بازی کن."]],quizK:"آزمون کوتاه",quizH:"گرفتی؟",correct:"درست است.",wrong:"این همان دام همیشگی است.",result:"نتیجه: {score}/3",footer:"چرخش را بخوان. توپ را بازی کن. رویه را مقصر ندان."},
ja:{...en,brand:"粒高",navIdea:"基本",navLab:"ラボ",navPlay:"作戦",navQuiz:"クイズ",badge:"クラブ向け・速習ビジュアルガイド",heroTitle:'回転を読め。<br><span>粒高に勝て。</span>',lead:"粒高は魔法ではありません。あなたの回転を変化・減少・反転させて返します。",cta1:"6つの打法を見る",cta2:"対戦方法",ideaK:"黄金ルール",ideaH:"魔法ではない。回転への反応だ。",ideaP:"粒高は裏ソフトのようにボールをつかみません。粒が倒れ、エネルギーを吸収し、返球の回転を変えます。",cards:[["上回転を送る","下回転で返ることが多く、次の攻撃がネットに落ちやすくなります。"],["下回転を送る","返球はより平らで、ナックル気味になることがあります。"],["回転をかけない","返球も低回転。ボールは遅く、低く、死んだように感じます。"]],labK:"ビジュアルラボ",labH:"覚えるべき6打法",labP:"打法をタップ。粒に当たったときの変化を見てみよう。",playK:"実戦プラン",playH:"粒高を攻略する方法",playP:"ラバーに腹を立てないこと。自分の回転を読めていないだけです。",truth:[["1. シンプルに始める","回転を減らし、フラットに打ちます。"],["2. 自動的に攻撃しない","強い上回転の後は、下回転かナックルを予測。"],["3. 軌道を見る","ナックルは持ち上げすぎず、下回転にはラケットを開く。"],["4. プライドよりリズム","遅く、短く、深く、フラットに。"]],quizK:"ミニクイズ",quizH:"わかった？",correct:"正解。",wrong:"典型的な落とし穴です。",result:"スコア：{score}/3",footer:"回転を読む。ボールを打つ。ラバーのせいにしない。"},
uk:{brand:"ДОВГІ ШИПИ",navIdea:"Принцип",navLab:"Лабораторія",navPlay:"План гри",navQuiz:"Тест",badge:"Короткий наочний посібник для клубу",heroTitle:'Читай обертання.<br><span>Перемагай шипи.</span>',lead:"Довгі шипи — не магія. Вони повертають твоє обертання зміненим, послабленим або зворотним.",cta1:"Переглянути 6 ударів",cta2:"Як проти них грати",ideaK:"Золоте правило",ideaH:"Вони не творять магію. Вони реагують на обертання.",ideaP:"Довгі шипи не чіпляють м’яч так, як гладка накладка. Шипи згинаються, поглинають енергію та змінюють обертання м’яча у відповідь.",cards:[["Входить верхнє обертання","Часто повертається нижнє обертання. Через це наступна атака потрапляє в сітку."],["Входить нижнє обертання","М’яч може повернутися пласкішим або майже без обертання."],["Входить мало обертання","Зазвичай мало обертання й повертається. М’яч здається мертвим, повільним і низьким."]],labK:"Наочна лабораторія",labH:"Шість важливих ударів",labP:"Натисни на удар. Анімація покаже, що відбувається під час контакту м’яча з шипами.",cases:[["Підрізка проти топспіну","Ти подаєш топспін. Блок або підрізка довгими шипами повертає нижнє обертання. Не підіймай м’яч як звичайний.","Зміна обертання","Топспін → Бекспін"],["Підрізка проти бекспіну","Ти подаєш нижнє обертання. Шипи згинаються і послаблюють його. М’яч може повернутися більш пласким.","Послаблення","Бекспін"],["Атака проти бекспіну","Довгими шипами теж можна атакувати. Проти нижнього обертання удар виходить низьким, пласким і незручним.","Атака","Низький м’яч"],["Атака проти топспіну","Атака довгими шипами змінює траєкторію та забирає швидкість м’яча.","Зміна ритму","Незвична траєкторія"],["Панч проти топспіну","Різкий поштовх гасить швидкість. М’яч приходить без енергії та з незручним обертанням.","Мертвий м’яч","Активний блок"],["Панч проти бекспіну","М’яч повертається не дуже підрізаним і не дуже активним. Перемагай читанням, а не силою.","Читання","Контроль"]],playK:"Практичний план",playH:"Як вижити проти довгих шипів",playP:"Не злись на накладку. Вона лише показує, що ти не прочитав власне обертання.",truth:[["1. Починай просто.","Грай пласкіше та з меншим обертанням — так буде менше сюрпризів."],["2. Не атакуй автоматично.","Після сильного топспіну очікуй підрізаний або мертвий м’яч."],["3. Стеж за траєкторією.","Плаский м’яч підіймай менше; для підрізаного відкривай ракетку."],["4. Змінюй ритм, а не его.","Повільно, коротко, глибоко, пласко. Змусь суперника думати."]],quizK:"Мінітест",quizH:"Зрозуміло?",quiz:[["Ти граєш сильний топспін, а суперник блокує довгими шипами. Що повернеться?",["Ще сильніший топспін","Підрізаний або мертвий м’яч","Такий самий м’яч, як від гладкої накладки"],1],["Що буде, якщо подати майже без обертання?",["Зазвичай повернеться мало обертання","Завжди повернеться дуже сильне обертання","М’яч щоразу буде неможливо прочитати"],0],["Найкраща початкова стратегія — це…",["Атакувати кожен м’яч сильніше","Звинувачувати ракетку","Зменшити обертання, змінювати ритм і читати відповідь"],2]],correct:"Правильно.",wrong:"Це класична пастка.",result:"Результат: {score}/3",footer:"Читай обертання. Грай м’яч. Не звинувачуй накладку."}});
const gifs=["lp_chop_vs_topspin_6.gif","lp_chop_vs_backspin_1.gif","lp_loop_vs_backspin.gif","lp_loop_vs_topspin.gif","lp_punch_vs_topspin_1.gif","lp_punch_vs_backspin.gif"].map(x=>"https://gregsttpages.com/wp-content/uploads/2018/05/"+x);
const languageNames={en:"English",es:"Español",ca:"Català",pl:"Polski",fr:"Français",de:"Deutsch",uk:"Українська",fa:"فارسی",ja:"日本語"};
let lang="en",t=en,currentCase=0,qi=0,score=0;
function localCases(){return t.cases||en.cases}
function renderCase(i){currentCase=i;const c=localCases()[i];document.querySelectorAll(".controls button").forEach((b,j)=>b.classList.toggle("active",i===j));caseTitle.textContent=c[0];caseText.textContent=c[1];tagA.textContent=c[2];tagB.textContent=c[3];caseGif.src=gifs[i]}
function renderQuiz(){qi=0;score=0;questions.innerHTML="";(t.quiz||en.quiz).forEach((q,i)=>{const box=document.createElement("div");box.className="q"+(i===0?" active":"");box.innerHTML=`<h3>${q[0]}</h3><div class="options">${q[1].map((a,j)=>`<button data-answer="${j}" data-correct="${q[2]}">${a}</button>`).join("")}</div>`;questions.append(box)});result.textContent="";questions.querySelectorAll("button").forEach(b=>b.onclick=()=>{const ok=b.dataset.answer===b.dataset.correct;if(ok)score++;result.innerHTML=`<span class="${ok?'good':'bad'}">${ok?t.correct:t.wrong}</span>`;setTimeout(()=>{const all=[...document.querySelectorAll(".q")];all[qi].classList.remove("active");qi++;if(qi<all.length){all[qi].classList.add("active");result.textContent=""}else result.textContent=t.result.replace("{score}",score)},650)})}
function applyLanguage(code){lang=code;t=translations[code]||en;document.documentElement.lang=code;document.documentElement.dir=code==="fa"?"rtl":"ltr";document.querySelectorAll("[data-t]").forEach(el=>el.textContent=t[el.dataset.t]);document.querySelectorAll("[data-html]").forEach(el=>el.innerHTML=t[el.dataset.html]);cards.innerHTML=t.cards.map(x=>`<div class="mini"><b>${x[0]}</b><span>${x[1]}</span></div>`).join("");truth.innerHTML=t.truth.map(x=>`<div><b>${x[0]}</b><br>${x[1]}</div>`).join("");controls.innerHTML=localCases().map((x,i)=>`<button data-i="${i}">${i+1}. ${x[0]}</button>`).join("");controls.querySelectorAll("button").forEach(b=>b.onclick=()=>renderCase(+b.dataset.i));changeLanguage.textContent=languageNames[code]||languageNames.en;document.title=`${t.brand} — ${t.ideaH}`;renderCase(0);renderQuiz()}
languageList.querySelectorAll("button").forEach(button=>button.addEventListener("click",()=>{const code=button.dataset.lang;applyLanguage(code);localStorage.setItem("pipsLanguage",code);entry.classList.add("done");site.classList.add("ready")}));
changeLanguage.onclick=()=>{entry.classList.remove("done");languageList.querySelector(`[data-lang="${lang}"]`)?.focus()};
const saved=localStorage.getItem("pipsLanguage");if(saved&&translations[saved]){applyLanguage(saved);entry.classList.add("done");site.classList.add("ready")}else applyLanguage("en");
</script>
